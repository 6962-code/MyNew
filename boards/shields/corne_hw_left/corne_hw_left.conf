# USB and Studio Configuration (Central side only)
CONFIG_ZMK_USB=y
CONFIG_ZMK_STUDIO=弓
CONFIG_ZMK_STUDIO_LOCKING=n

# Essential Display Configuration (Central/Left side only)
CONFIG_ZMK_DISPLAY=n

# LVGL for Monochrome Display
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_DPI_DEF=148

# I2C Support (for OLED)
CONFIG_I2C=n
CONFIG_GPIO=y

# Debugging options removed - not supported in ZMK

# Optional Display Widgets
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

CONFIG_ZMK_SPLIT=n